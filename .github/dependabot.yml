version: 2
updates:
  - package-ecosystem: "nuget"
    directories:
      - "**/*"
    commit-message:
      prefix: "chore(nuget)"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "03:00"
      timezone: "Europe/Warsaw"
    groups:
      xUnit:
        patterns:
          - "xunit"
          - "xunit.*"
          - "xunit.runner.*"
      AutoFixture:
        patterns:
          - "AutoFixture*"
      Analyzers:
        patterns:
          - "*analyzer*"
        exclude-patterns:
          - "xunit.analyzers"
      Testing:
        patterns:
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.msbuild"
      Common:
        patterns:
          - "Castle.Core"
          - "JetBrains.Annotations"
          - "Microsoft.SourceLink.GitHub"
          - "Microsoft.NETFramework.ReferenceAssemblies"
      Other:
        patterns:
          - "*"
    ignore:
      - dependency-name: "Moq"
  - package-ecosystem: "github-actions"
    directory: "/"
    commit-message:
      prefix: "chore(github-actions)"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "02:00"
      timezone: "Europe/Warsaw"
